name: Tests

# Test pipeline for the project work: runs the whole test pyramid
# (unit, integration, E2E, load) on GitHub-hosted runners.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  unit:
    name: Unit tests (client / Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npm run test:unit
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: client-coverage
          path: client/coverage
          retention-days: 14

  integration:
    name: Integration tests (server / Jest + supertest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: planka_test
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/planka_test
      SECRET_KEY: ci-test-secret
      BASE_URL: http://localhost:1337
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run integration tests
        run: npm run test:integration

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Start PLANKA stack
        run: docker compose up -d --build --wait

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Install Playwright browser
        working-directory: client
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: client
        env:
          E2E_BASE_URL: http://localhost:3000
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: client/playwright-report
          retention-days: 14

      - name: Stop stack
        if: always()
        run: docker compose down -v

  load:
    name: Load tests (k6)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start PLANKA stack
        run: docker compose up -d --build --wait

      - name: Initialize instance (accept terms)
        run: bash scripts/accept-terms.sh http://localhost:3000

      - name: Run load tests (k6 via docker)
        run: |
          mkdir -p load/results && chmod 777 load/results
          docker run --rm --network host -e BASE_URL=http://localhost:3000 \
            -v "$PWD/load:/load" grafana/k6 run \
            --summary-export /load/results/login-summary.json /load/login-load.js
          docker run --rm --network host -e BASE_URL=http://localhost:3000 \
            -v "$PWD/load:/load" grafana/k6 run \
            --summary-export /load/results/projects-summary.json /load/projects-load.js

      - name: Upload k6 summaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-load-summaries
          path: load/results
          retention-days: 14

      - name: Stop stack
        if: always()
        run: docker compose down -v
